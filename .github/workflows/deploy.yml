name: Build and Deploy

# Запускається при кожному push в main гілку
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Завантажити код з репозиторію
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Встановити .NET 10
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 3. Зібрати проєкт для публікації
      - name: Publish
        run: dotnet publish Server/OqtaneSite.Server.csproj -c Release -o ./publish

      # 4. Покласти зібрані файли в гілку deploy
      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: deploy
